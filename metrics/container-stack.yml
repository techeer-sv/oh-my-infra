services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.56.2
    container_name: cadvisor
    privileged: true
    ports:
      - "8080:8080"
    networks:
      - metric-network
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
  
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    ports:
      - "9090:9090"
    user: root
    networks:
      - metric-network
      - grafana-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/:/etc/prometheus/
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=3GB'
      - '--web.enable-lifecycle'

networks:
  metric-network:
    driver: bridge
    name: metric-network
  grafana-network:
    driver: bridge
    name: grafana-network