server:
  http_listen_port: 4040
  grpc_listen_port: 9095
  log_level: debug

storage:
  backend: s3
  s3:
    endpoint: pyroscope-minio:9000
    bucket_name: pyroscope
    access_key_id: minio
    secret_access_key: minio123
    insecure: true

memberlist:
  bind_port: 7946
  join_members:
    - pyroscope-ingester:7946
  message-history-buffer-bytes: 1048576

ingester:
  lifecycler:
    ring:
      kvstore:
        store: memberlist
      replication_factor: 1
